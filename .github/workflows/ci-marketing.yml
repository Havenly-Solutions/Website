name: Marketing Site CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── LINT & TYPE CHECK ──────────────────────────────────────────
  lint-and-type:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── BUILD CHECK ────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: lint-and-type
    env:
      NEXT_PUBLIC_LAUNCH_DATE: '2026-11-24'
      NEXT_PUBLIC_HAVENLY_DOMAIN: 'havenly.co.za'
      NEXT_PUBLIC_DASHBOARD_API_URL: 'http://localhost:3001'
      NEXT_PUBLIC_MAPBOX_TOKEN: 'pk.test'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

  # ─── DEPLOY TO VERCEL ───────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        if: env.VERCEL_TOKEN != ''
        run: |
          npm install -g vercel
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" \
            --build-env NEXT_PUBLIC_LAUNCH_DATE=2026-11-24 \
            --build-env NEXT_PUBLIC_HAVENLY_DOMAIN=havenly.co.za \
            --build-env NEXT_PUBLIC_DASHBOARD_API_URL=https://api.havenly.co.za
